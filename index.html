<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lumieree</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0ece4;
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 32px 24px 0;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #f0ece4;
    }

    .hero {
      text-align: center;
      padding: 60px 24px 20px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 8vw, 5.5rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.01em;
      color: #f0ece4;
    }

    .hero h1 span { color: #c9a97a; }

    .social-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding: 48px 24px 0;
    }

    .social-icons { display: flex; gap: 20px; }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.15);
      color: #f0ece4;
      text-decoration: none;
      transition: border-color 0.3s, background 0.3s;
      flex-shrink: 0;
      overflow: visible;
    }

    .social-icons a:hover {
      border-color: #c9a97a;
      background: rgba(201,169,122,0.12);
    }

    .social-icons svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      flex-shrink: 0;
      display: block;
      overflow: visible;
    }

    .exclusive-text { text-align: center; max-width: 480px; }

    .exclusive-text p {
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #a89a88;
      margin-bottom: 10px;
    }

    .exclusive-text h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      line-height: 1.3;
      margin-bottom: 18px;
    }

    .fanvue-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 20px 52px;
      border: 1px solid #c9a97a;
      border-radius: 4px;
      color: #c9a97a;
      text-decoration: none;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }

    .fanvue-btn:hover { background: #c9a97a; color: #0d0d0d; }

    /* ── GALLERY ── */
    .gallery-section {
      padding: 64px 0 80px;
      position: relative;
    }

    /* Обгортка зі стрілками по боках */
    .gallery-outer {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .gallery-arrow {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #f0ece4;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
      z-index: 2;
      margin: 0 10px;
    }

    .gallery-arrow:hover {
      border-color: #c9a97a;
      background: rgba(201,169,122,0.12);
    }

    .gallery-track-wrapper {
      overflow: hidden;
      flex: 1;
    }

    .gallery-track {
      display: flex;
      gap: 16px;
      transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
      cursor: grab;
    }

    .gallery-track.dragging {
      cursor: grabbing;
      transition: none;
    }

    .gallery-slide {
      flex: 0 0 calc(33.333% - 11px);
      min-width: 280px;
      aspect-ratio: 3/4;
      border-radius: 8px;
      overflow: hidden;
      background: #1a1a1a;
      cursor: pointer;
    }

    .gallery-slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
      pointer-events: none;
    }

    .gallery-slide:hover img { transform: scale(1.04); }

    .gallery-slide .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a3a3a;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
    }

    /* ── LIGHTBOX ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 6px;
      user-select: none;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: #f0ece4;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .lightbox-close:hover { opacity: 1; }

    .lightbox-prev, .lightbox-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.2);
      color: #f0ece4;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .lightbox-prev { left: 20px; }
    .lightbox-next { right: 20px; }

    .lightbox-prev:hover, .lightbox-next:hover {
      border-color: #c9a97a;
      background: rgba(201,169,122,0.12);
    }

    @media (max-width: 680px) {
      .gallery-slide { flex: 0 0 80vw; }
      .gallery-arrow { margin: 0 4px; width: 36px; height: 36px; font-size: 0.9rem; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
    }
  </style>
</head>
<body>

    </div>

    <div class="exclusive-text">
      <p>Exclusive content</p>

        ✦ &nbsp;Subscribe on Fanvue

  <section class="gallery-section">
    <div class="gallery-outer">

      <button class="gallery-arrow" id="prev" aria-label="Previous">&#8592;</button>

      <div class="gallery-track-wrapper">
        <div class="gallery-track" id="track">

          <div class="gallery-slide"><img src="1.webp" alt="Photo 1" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 1</div>'"></div>
          <div class="gallery-slide"><img src="2.webp" alt="Photo 2" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 2</div>'"></div>
          <div class="gallery-slide"><img src="3.webp" alt="Photo 3" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 3</div>'"></div>
          <div class="gallery-slide"><img src="4.webp" alt="Photo 4" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 4</div>'"></div>
          <div class="gallery-slide"><img src="5.webp" alt="Photo 5" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 5</div>'"></div>
          <div class="gallery-slide"><img src="6.webp" alt="Photo 6" onerror="this.parentNode.innerHTML='<div class=placeholder>PHOTO 6</div>'"></div>

        </div>
      </div>

      <button class="gallery-arrow" id="next" aria-label="Next">&#8594;</button>

    </div>
  </section>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">&#215;</button>
    <button class="lightbox-prev" id="lbPrev">&#8592;</button>
    <img id="lbImg" src="" alt=""/>
    <button class="lightbox-next" id="lbNext">&#8594;</button>
  </div>

  <script>
    const track = document.getElementById('track');
    const slides = track.querySelectorAll('.gallery-slide');
    let index = 0;
    let startX = 0;
    let isDragging = false;
    let dragMoved = false;

    function getVisible() {
      return window.innerWidth <= 680 ? 1 : 3;
    }

    function maxIndex() {
      return Math.max(0, slides.length - getVisible());
    }

    function update() {
      const slideWidth = slides[0].offsetWidth + 16;
      track.style.transform = `translateX(-${index * slideWidth}px)`;
    }

    document.getElementById('next').addEventListener('click', () => {
      index = index >= maxIndex() ? 0 : index + 1;
      update();
    });

    document.getElementById('prev').addEventListener('click', () => {
      index = index <= 0 ? maxIndex() : index - 1;
      update();
    });

    // Touch
    track.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
      dragMoved = false;
    }, { passive: true });

    track.addEventListener('touchmove', () => { dragMoved = true; }, { passive: true });

    track.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) {
        index = diff > 0
          ? (index >= maxIndex() ? 0 : index + 1)
          : (index <= 0 ? maxIndex() : index - 1);
        update();
      }
    }, { passive: true });

    // Mouse drag
    track.addEventListener('mousedown', e => {
      isDragging = true;
      dragMoved = false;
      startX = e.clientX;
      track.classList.add('dragging');
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      if (Math.abs(e.clientX - startX) > 5) dragMoved = true;
    });

    window.addEventListener('mouseup', e => {
      if (!isDragging) return;
      isDragging = false;
      track.classList.remove('dragging');
      const diff = startX - e.clientX;
      if (Math.abs(diff) > 50) {
        index = diff > 0
          ? (index >= maxIndex() ? 0 : index + 1)
          : (index <= 0 ? maxIndex() : index - 1);
        update();
      }
    });

    window.addEventListener('mouseleave', () => {
      isDragging = false;
      track.classList.remove('dragging');
    });

    window.addEventListener('resize', update);

    // ── LIGHTBOX ──
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    let lbIndex = 0;

    const imgSrcs = Array.from(slides).map(s => {
      const img = s.querySelector('img');
      return img ? img.src : null;
    }).filter(Boolean);

    function openLightbox(i) {
      lbIndex = i;
      lbImg.src = imgSrcs[lbIndex];
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    slides.forEach((slide, i) => {
      slide.addEventListener('click', () => {
        if (dragMoved) return;
        if (slide.querySelector('img')) openLightbox(i);
      });
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);

    document.getElementById('lbNext').addEventListener('click', () => {
      lbIndex = lbIndex >= imgSrcs.length - 1 ? 0 : lbIndex + 1;
      lbImg.src = imgSrcs[lbIndex];
    });

    document.getElementById('lbPrev').addEventListener('click', () => {
      lbIndex = lbIndex <= 0 ? imgSrcs.length - 1 : lbIndex - 1;
      lbImg.src = imgSrcs[lbIndex];
    });

    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
      if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
    });
  </script>

</body>
</html>
